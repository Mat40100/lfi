# Self-hosted Ghost stack: Ghost + MySQL 8 + Caddy reverse proxy.
#
#   ghost  -> the publishing app (custom image in ./ghost)
#   mysql  -> database (official MySQL 8)
#   caddy  -> reverse proxy / TLS terminator (official Caddy)
#
# Copy .env.example to .env and set passwords before `docker compose up -d`.

services:
  ghost:
    build:
      context: ./ghost
    image: lfi-ghost:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Public URL Caddy serves. For local testing: http://localhost
      url: ${GHOST_URL:-http://localhost}
      database__client: mysql
      database__connection__host: mysql
      database__connection__port: "3306"
      database__connection__user: ${MYSQL_USER:-ghost}
      database__connection__password: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
      database__connection__database: ${MYSQL_DATABASE:-ghost}
    volumes:
      - ./data/ghost-content:/var/lib/ghost/content
    expose:
      - "2368"
    networks:
      - web
      - internal

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    # Ghost expects the classic auth plugin for the connecting user.
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ghost}
      MYSQL_USER: ${MYSQL_USER:-ghost}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env}
    volumes:
      - ./data/mysql:/var/lib/mysql
    healthcheck:
      # `ping` returns success once the server accepts connections.
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - ghost
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    networks:
      - web

networks:
  web:
  internal:
